# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.13"
  jobs:
    # Read the Docs runs sphinx-build directly and does not use the Makefile,
    # so the Makefile's rst_copy step never runs on deploy. Therefore we replicate it here:
    # copy the raw .rst sources into the HTML output so the "View raw source"
    # footer links resolve instead of 404ing.
    post_build:
      - rsync -a --include='*/' --include='*.rst' --exclude='*' "source/" "$READTHEDOCS_OUTPUT/html/"

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: source/conf.py
  fail_on_warning: true

# We recommend specifying your dependencies to enable reproducible builds:
# https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
  install:
  - requirements: requirements.txt
